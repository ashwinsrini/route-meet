name: API Health Check

on:
  schedule:
    - cron: '0 8 * * *'  # 8 AM UTC daily
  workflow_dispatch:       # manual trigger

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run health check
        id: health
        run: |
          node tests/api-health-check.js --json > result.json 2>&1
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Open or update issue on failure
        if: steps.health.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report = 'Health check failed to produce output.';
            try {
              const raw = fs.readFileSync('result.json', 'utf8');
              const result = JSON.parse(raw);
              const failed = result.checks.filter(c => !c.passed);
              report = failed.map(c => `- **${c.name}**: ${c.detail}`).join('\n');
            } catch (e) {
              report += '\n\nParse error: ' + e.message;
            }

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'api-breakage',
              per_page: 1
            });

            if (issues.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: `## Still failing — ${new Date().toISOString().split('T')[0]}\n\n${report}`
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Google Maps API response structure changed',
                body: `The daily health check detected that Google Maps' internal directions API has changed. This will likely break the extension.\n\n### Failed checks\n${report}\n\n### What to do\n1. Inspect the current API response\n2. Update parsing in \`background/service-worker.js\`\n3. Update checks in \`tests/api-health-check.js\`\n\n_Auto-generated by health-check workflow._`,
                labels: ['api-breakage']
              });
            }
